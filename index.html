<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ember</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      background: #f7f7f7;
      color: #222;
    }

    h1 {
      margin-bottom: 20px;
    }

    #chat-form {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    #chat-input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
    }

    #send-button {
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
    }

    #chat-output {
      white-space: pre-wrap;
      background: white;
      border: 1px solid #ddd;
      padding: 16px;
      min-height: 120px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Ember</h1>

  <form id="chat-form">
    <input id="chat-input" type="text" placeholder="Talk to Ember..." />
    <button id="send-button" type="submit">Send</button>
  </form>

  <div id="chat-output">Your response will appear here.</div>

  <script>
    const form = document.getElementById("chat-form");
    const input = document.getElementById("chat-input");
    const output = document.getElementById("chat-output");
    const button = document.getElementById("send-button");

    async function sendMessage(message) {
      const res = await fetch("https://ember-production-c6b3.up.railway.app/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || "Request failed");
      }

      return data.reply;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const message = input.value.trim();
      if (!message) return;

      output.textContent = "Ember is thinking...";
      button.disabled = true;

      try {
        const reply = await sendMessage(message);
        output.textContent = reply;
        input.value = "";
      } catch (err) {
        output.textContent = "Something went wrong: " + err.message;
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
