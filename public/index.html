<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Ember</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      /* Typography scale */
      --text-xs:   clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem,0.8rem + 0.35vw,1rem);
      --text-base: clamp(1rem,0.95rem + 0.25vw,1.125rem);
      --text-lg:   clamp(1.125rem,1rem + 0.75vw,1.5rem);
      --text-xl:   clamp(1.5rem,1.2rem + 1.25vw,2.25rem);

      /* Spacing */
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;

      /* Ember palette – dark first */
      --color-bg: #11100f;
      --color-surface: #171614;
      --color-surface-2: #1e1c1a;
      --color-text: #e4e2dc;
      --color-text-soft: #b0aea7;
      --color-text-faint: #6f6d67;
      --color-primary: #f28f3b; /* ember glow */
      --color-border-subtle: rgba(255, 255, 255, 0.06);
      --color-accent-soft: rgba(242, 143, 59, 0.12);

      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-pill: 999px;

      --shadow-soft: 0 18px 45px rgba(0,0,0,0.55);

      --content-width: min(960px, 100vw - 2.5rem);

      --transition-fast: 160ms cubic-bezier(0.16, 1, 0.3, 1);

      --font-body: "Work Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-reflect: "Instrument Serif", "Georgia", serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.6;
      color: var(--color-text);
      background: radial-gradient(circle at top, #241b13 0, #0b0a09 60%, #060505 100%);
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: var(--space-6) var(--space-3);
    }

    .ember-shell {
      width: var(--content-width);
      max-height: 100vh;
      background: radial-gradient(circle at top, #1f1812 0, #141311 45%, #11100f 100%);
      border-radius: 1.25rem;
      border: 1px solid var(--color-border-subtle);
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .ember-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4) var(--space-5) var(--space-3);
      border-bottom: 1px solid var(--color-border-subtle);
      backdrop-filter: blur(16px);
      background: linear-gradient(to bottom, rgba(10,9,7,0.85), rgba(10,9,7,0.4));
      position: relative;
      z-index: 2;
    }

    .ember-logo {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      color: var(--color-text);
    }

    .ember-mark {
      width: 26px;
      height: 26px;
      border-radius: 40% 60% 70% 30%;
      background: radial-gradient(circle at 30% 20%, #fcd9a1 0, #f28f3b 32%, #b45022 64%, #3a1305 100%);
      box-shadow:
        0 0 22px rgba(242, 143, 59, 0.55),
        0 0 1px rgba(0,0,0,0.9);
    }

    .ember-title {
      font-size: var(--text-sm);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--color-text-faint);
    }

    .ember-tagline {
      font-size: var(--text-xs);
      color: var(--color-text-soft);
    }

    .ember-controls {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-xs);
      color: var(--color-text-faint);
    }

    .pill-button {
      border-radius: var(--radius-pill);
      border: 1px solid var(--color-border-subtle);
      padding: 0.4rem 0.9rem;
      background: rgba(13,12,10,0.8);
      color: var(--color-text-soft);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: var(--text-xs);
      transition: background var(--transition-fast), border-color var(--transition-fast), color var(--transition-fast);
    }

    .pill-button:hover {
      background: rgba(26,22,18,0.95);
      border-color: rgba(242,143,59,0.45);
      color: var(--color-text);
    }

    .pill-button.danger {
      border-color: rgba(255, 105, 97, 0.4);
    }

    .pill-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #ffe9c7 0, #f28f3b 60%, #4b2512 100%);
    }

    .ember-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: var(--space-4) var(--space-5);
      gap: var(--space-3);
      overflow: hidden;
    }

    .canvas-wrapper {
      position: relative;
      flex: 1;
      border-radius: var(--radius-lg);
      background: radial-gradient(circle at top left, rgba(242,143,59,0.12) 0, rgba(19,16,12,0.96) 35%, rgba(12,11,9,0.98) 100%);
      border: 1px solid rgba(255,255,255,0.04);
      padding: var(--space-4) var(--space-4) var(--space-6);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .canvas-scroll {
      flex: 1;
      overflow-y: auto;
      padding-right: 0.25rem;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      scroll-behavior: smooth;
    }

    .canvas-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .canvas-scroll::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
    }

    .entry-echo {
      font-family: var(--font-reflect);
      font-size: var(--text-sm);
      color: var(--color-text-faint);
      letter-spacing: 0.02em;
      max-width: 38rem;
    }

    .entry-echo span {
      opacity: 0.85;
    }

    .segment {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      max-width: 46rem;
    }

    .segment-user {
      color: var(--color-text);
      font-size: var(--text-base);
    }

    .segment-user p {
      white-space: pre-wrap;
    }

    .segment-ember {
      font-family: var(--font-reflect);
      font-size: var(--text-sm);
      color: var(--color-text-soft);
      border-left: 1px solid rgba(242,143,59,0.35);
      padding-left: var(--space-3);
      position: relative;
    }

    .segment-ember::before {
      content: "";
      position: absolute;
      left: -2px;
      top: 0.35rem;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #ffe9c7 0, #f28f3b 55%, #5a2c16 100%);
      box-shadow: 0 0 8px rgba(242,143,59,0.7);
    }

    .segment-ember p {
      white-space: pre-wrap;
    }

    .session-residue {
      margin-top: var(--space-1);
      font-family: var(--font-reflect);
      font-size: var(--text-sm);
      color: var(--color-primary);
      opacity: 0.85;
    }

    .composer {
      margin-top: var(--space-3);
      border-radius: var(--radius-md);
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(12,11,10,0.92);
      padding: var(--space-3);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .composer-label {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-2);
    }

    .typing-hint {
      font-style: italic;
      opacity: 0.85;
    }

    .composer-textarea {
      border: none;
      outline: none;
      resize: none;
      min-height: 3.5rem;
      max-height: 8rem;
      background: transparent;
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.6;
    }

    .composer-textarea::placeholder {
      color: rgba(255,255,255,0.2);
    }

    .composer-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: var(--text-xs);
      color: var(--color-text-faint);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      margin-right: 0.4rem;
      background: radial-gradient(circle at 30% 20%, #ffe9c7 0, #f28f3b 60%, #3a1305 100%);
      box-shadow: 0 0 8px rgba(242,143,59,0.7);
    }

    .status-dot.idle {
      background: radial-gradient(circle at 30% 20%, #e3e1dc 0, #9a978f 60%, #3a3834 100%);
      box-shadow: none;
    }

    .status-text {
      display: inline-flex;
      align-items: center;
    }

    .hint-keys {
      opacity: 0.8;
    }

    .error-banner {
      margin-top: var(--space-2);
      padding: 0.4rem 0.75rem;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(255,105,97,0.4);
      color: #ffb3aa;
      font-size: var(--text-xs);
      background: rgba(57,16,14,0.85);
    }

    @media (max-width: 768px) {
      body {
        padding: var(--space-3);
      }
      .ember-shell {
        border-radius: 1rem;
      }
      .ember-header {
        padding: var(--space-3) var(--space-3) var(--space-2);
      }
      .ember-main {
        padding: var(--space-3);
      }
      .canvas-wrapper {
        padding: var(--space-3) var(--space-3) var(--space-5);
      }
    }
  </style>
</head>
<body>
  <div class="ember-shell">
    <header class="ember-header">
      <div class="ember-logo">
        <div class="ember-mark"></div>
        <div>
          <div class="ember-title">EMBER</div>
          <div class="ember-tagline">Reflective intelligence, not chat.</div>
        </div>
      </div>
      <div class="ember-controls">
        <button class="pill-button" id="pathToggle" type="button">
          <span class="pill-dot"></span>
          Path
        </button>
        <button class="pill-button danger" id="clearMemoryBtn" type="button" title="Forget what Ember remembers from this device">
          Incinerate
        </button>
      </div>
    </header>

    <main class="ember-main">
      <section class="canvas-wrapper">
        <div class="canvas-scroll" id="reflectiveCanvas" aria-live="polite">
          <div class="entry-echo" id="entryEcho">
            <span>“What has been quietly taking up space lately?”</span>
          </div>
          <!-- Segments will be appended here -->
        </div>

        <div class="composer">
          <div class="composer-label">
            <span class="typing-hint">Write as if you’re talking to yourself. Ember will respond when you pause.</span>
          </div>
          <textarea
            id="inputArea"
            class="composer-textarea"
            placeholder="Begin anywhere. A sentence, a fragment, a feeling..."
            spellcheck="true"
          ></textarea>
          <div class="composer-footer">
            <div class="status-text" id="statusText">
              <span class="status-dot idle" id="statusDot"></span>
              <span>Idle — nothing is being sent.</span>
            </div>
            <div class="hint-keys">
              Press <strong>Ctrl + Enter</strong> to respond immediately.
            </div>
          </div>
          <div class="error-banner" id="errorBanner" style="display:none;"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    (function() {
      const inputArea = document.getElementById('inputArea');
      const canvas = document.getElementById('reflectiveCanvas');
      const entryEcho = document.getElementById('entryEcho');
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const errorBanner = document.getElementById('errorBanner');
      const clearMemoryBtn = document.getElementById('clearMemoryBtn');
      const pathToggle = document.getElementById('pathToggle');

      let typingTimer = null;
      let isSending = false;
      let lastUserBlock = null;
      let residueLine = null;

      const PULSE_DELAY = 1800; // ms of silence before Ember responds

      function setStatus(mode, message) {
        if (mode === 'thinking') {
          statusDot.classList.remove('idle');
          statusDot.title = 'Ember is reflecting';
          statusText.innerHTML = '<span class="status-dot" id="statusDot"></span><span>Ember is reflecting…</span>';
        } else if (mode === 'error') {
          statusDot.classList.add('idle');
          statusDot.title = 'Error';
          statusText.innerHTML = '<span class="status-dot idle" id="statusDot"></span><span>' + (message || 'Something went wrong.') + '</span>';
        } else {
          statusDot.classList.add('idle');
          statusDot.title = 'Idle';
          statusText.innerHTML = '<span class="status-dot idle" id="statusDot"></span><span>' + (message || 'Idle — nothing is being sent.') + '</span>';
        }
      }

      function showError(msg) {
        errorBanner.textContent = msg || 'Something went wrong talking with Ember.';
        errorBanner.style.display = 'block';
      }

      function clearError() {
        errorBanner.textContent = '';
        errorBanner.style.display = 'none';
      }

      function scrollToBottom() {
        requestAnimationFrame(() => {
          canvas.scrollTop = canvas.scrollHeight;
        });
      }

      function createUserSegment(text) {
        const seg = document.createElement('article');
        seg.className = 'segment';

        const userDiv = document.createElement('div');
        userDiv.className = 'segment-user';
        const p = document.createElement('p');
        p.textContent = text.trim();
        userDiv.appendChild(p);

        seg.appendChild(userDiv);
        canvas.appendChild(seg);
        lastUserBlock = seg;

        // Once user begins, soften the entry echo
        if (entryEcho) {
          entryEcho.style.opacity = '0.25';
        }

        scrollToBottom();
        return seg;
      }

      function appendEmberResponse(text) {
        if (!text || !text.trim()) return;

        const targetSeg = lastUserBlock || createUserSegment('[first thought]');
        const emberDiv = document.createElement('div');
        emberDiv.className = 'segment-ember';
        const p = document.createElement('p');
        p.textContent = text.trim();
        emberDiv.appendChild(p);

        targetSeg.appendChild(emberDiv);
        scrollToBottom();

        // Optionally create residue line from last sentence
        const sentences = text.split(/(?<=[.!?])\s+/);
        const lastSentence = sentences[sentences.length - 1] || text;
        updateResidue(lastSentence.trim());
      }

      function updateResidue(line) {
        if (!line) return;
        if (!residueLine) {
          residueLine = document.createElement('div');
          residueLine.className = 'session-residue';
          canvas.appendChild(residueLine);
        }
        residueLine.textContent = line;
      }

      async function sendToEmber(promptText) {
        if (isSending || !promptText.trim()) return;
        isSending = true;
        clearError();
        setStatus('thinking');

        try {
          const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: promptText })
          });

          if (!res.ok) {
            throw new Error('HTTP ' + res.status);
          }

          const data = await res.json();
          const reply = data.reply || data.response || data.message || data.text;

          if (!reply) {
            throw new Error('No reply field in response.');
          }

          appendEmberResponse(reply);
          setStatus('idle', 'Ember responded to your last entry.');
        } catch (err) {
          console.error(err);
          showError('Ember couldn’t respond just now. Your words are safe; try again in a moment.');
          setStatus('error', 'Error — could not reach Ember.');
        } finally {
          isSending = false;
        }
      }

      function pulseSend() {
        const value = inputArea.value;
        if (!value.trim()) return;

        // Commit current text into the canvas as a user segment
        createUserSegment(value);
        inputArea.value = '';
        sendToEmber(value);
      }

      inputArea.addEventListener('input', () => {
        clearError();
        if (typingTimer) {
          clearTimeout(typingTimer);
        }
        typingTimer = setTimeout(() => {
          if (!isSending && inputArea.value.trim().length > 0) {
            pulseSend();
          }
        }, PULSE_DELAY);
      });

      inputArea.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          if (!isSending && inputArea.value.trim().length > 0) {
            if (typingTimer) clearTimeout(typingTimer);
            pulseSend();
          }
        }
      });

      clearMemoryBtn.addEventListener('click', async () => {
        const confirmClear = window.confirm('Erase Ember’s memory of this space?\n\nThis clears the stored patterns and context Ember has built here.');
        if (!confirmClear) return;

        try {
          const res = await fetch('/memory/clear', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({})
          });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          // Visually soft reset
          const segments = canvas.querySelectorAll('.segment');
          segments.forEach(seg => seg.remove());
          if (residueLine) {
            residueLine.remove();
            residueLine = null;
          }
          if (entryEcho) {
            entryEcho.style.opacity = '1';
          }
          setStatus('idle', 'Memory cleared. This page is a fresh surface.');
        } catch (err) {
          console.error(err);
          showError('Memory could not be cleared just now. Try again in a moment.');
        }
      });

      pathToggle.addEventListener('click', async () => {
        alert('Path view will eventually show you a map of recurring themes and tensions.\nFor now, this is a placeholder while we wire the memory engine.');
      });

      // Initial state
      setStatus('idle', 'Idle — nothing is being sent.');
    })();
  </script>
</body>
</html>
